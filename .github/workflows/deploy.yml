name: Level2 - Branch Aware Deploy (Single EC2)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3️⃣ Login to Amazon ECR (CI side)
      - name: Login to Amazon ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $REGISTRY

      # 4️⃣ Set image tag (short SHA)
      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      # 5️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t level2-node-app:${{ env.IMAGE_TAG }} .

      # 6️⃣ Scan image with Trivy (DevSecOps Gate)
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: level2-node-app:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      # 7️⃣ Tag image with commit SHA
      - name: Tag image (commit)
        run: docker tag level2-node-app:${{ env.IMAGE_TAG }} $ECR_REPOSITORY:${{ env.IMAGE_TAG }}

      # 8️⃣ Tag image as latest
      - name: Tag image (latest)
        run: docker tag level2-node-app:${{ env.IMAGE_TAG }} $ECR_REPOSITORY:latest

      # 9️⃣ Push commit tag
      - name: Push commit tag
        run: docker push $ECR_REPOSITORY:${{ env.IMAGE_TAG }}

      # 🔟 Push latest tag
      - name: Push latest tag
        run: docker push $ECR_REPOSITORY:latest

      # 1️⃣1️⃣ Setup SSH agent
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # 1️⃣2️⃣ Branch-aware deployment
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e

            AWS_REGION=${AWS_REGION}
            ECR_REPO="${ECR_REPOSITORY}"
            REGISTRY=\$(echo \$ECR_REPO | cut -d'/' -f1)

            echo "Logging into ECR from EC2..."
            aws ecr get-login-password --region \$AWS_REGION | \
            docker login --username AWS --password-stdin \$REGISTRY

            echo "Pulling latest image..."
            docker pull \$ECR_REPO:latest

            if [ "${{ github.ref_name }}" = "dev" ]; then
              echo "Deploying DEV container..."
              docker rm -f level1-dev || true
              docker run -d \
                --name level1-dev \
                --restart always \
                -p 3001:3000 \
                \$ECR_REPO:latest
            else
              echo "Deploying PROD container..."
              docker rm -f level1-app || true
              docker run -d \
                --name level1-app \
                --restart always \
                -p 80:3000 \
                \$ECR_REPO:latest
            fi

            docker image prune -f
            echo "Deployment completed successfully."
          EOF