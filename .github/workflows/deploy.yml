name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            echo "Navigating to project directory..."
            cd levels

            echo "Pulling latest code..."
            git pull origin main

            echo "Stopping old container..."
            docker stop level1-app || true
            docker -f rm level1-app || true

            echo "Building new Docker image..."
            docker build -t level1-node-app:latest .

            echo "Starting new container..."
            docker run -d \
              --name level1-app \
              --restart always \
              -p 80:3000 \
              level1-node-app:latest

            echo "Cleaning unused Docker images..."
            docker image prune -f

            echo "Deployment completed successfully."
          EOF