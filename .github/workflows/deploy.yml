name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:   # ✅ Added manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Setup SSH Agent
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # ❌ Removed ssh-keyscan step (can fail in CI)

      # 🚀 Deploy
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e

            cd levels || exit 1

            git pull origin main

            docker stop level1-app || true
            docker rm level1-app || true

            docker build -t level1-node-app:latest .
            docker run -d -p 80:3000 --name level1-app level1-node-app:latest
          EOF